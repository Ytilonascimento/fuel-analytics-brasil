<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fuel Analytics Brasil</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <div class="logo-area">

    <img
        src="imagens/logo.png"
        alt="Fuel Analytics Brasil"
        class="logo">

    <p class="subtitulo">
    Sistema Inteligente de Análise de Combustíveis
</p>

</div>

<h2>Pesquisar Cidade</h2>

<div class="pesquisa">

    <label for="cidade">Cidade</label>

    <input
        type="text"
        id="cidade"
        placeholder="Digite o nome da cidade">

    <button id="buscar">
        🔍 Pesquisar
    </button>

</div>

<hr>

<h2>Comparar Cidades</h2>

<div class="comparacao">

    <input
        class="comparar-input"
        type="text"
        id="cidade1"
        placeholder="Digite a primeira cidade">

    <input
        class="comparar-input"
        type="text"
        id="cidade2"
        placeholder="Digite a segunda cidade">

    <button
        class="comparar-btn"
        id="comparar">

        📊 Comparar

    </button>

</div>

        <div id="resultado">

    

            <h2>Resultado</h2>

            <p>
                Faça uma pesquisa para visualizar os preços.
            </p>

        </div>

    </div>

    <footer>

    Desenvolvido por Ytilo Nascimento • 2026

</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/script.js"></script>

</body>

</html>
